query tenant($tenantId: String!) {
  tenant: itPolitoCrownlabsV1alpha2Tenant(name: $tenantId) {
    spec {
      email
      firstName
      lastName
      lastLogin
      personalWorkspace {
        cpu
        instances
        memory
        disk
        otherResources
      }
      workspaces {
        role
        name
        workspaceWrapperTenantV1alpha2 {
          itPolitoCrownlabsV1alpha1Workspace {
            spec {
              prettyName
              quota {
                cpu
                instances
                memory
                disk
                otherResources
              }
            }
            status {
              namespace {
                name
              }
            }
          }
        }
      }
      publicKeys
    }
    metadata {
      name
      creationTimestamp
      labels
    }
    status {
      personalNamespace {
        name
        created
      }
    }
  }
}