apiVersion: crownlabs.polito.it/v1alpha2
kind: Template
metadata:
  name: multi-env-storage-test
  namespace: tenant-john-doe
spec:
  prettyName: Multi Env Storage Test
  description: A template to verify individual environment status behaviors
  environmentList:
    - name: env-first
      environmentType: Standalone
      mountMyDriveVolume: false
      image: harbor.crownlabs.polito.it/crownlabs-standalone/vscode-python:1.0.5
      resources:
        cpu: 1
        memory: 1Gi
        disk: 10Gi
        reservedCPUPercentage: 25
      persistent: true
      rewriteURL: true
    - name: env-second
      environmentType: Standalone
      mountMyDriveVolume: false
      image: harbor.crownlabs.polito.it/crownlabs-standalone/jupyterlab:1.0.0
      resources:
        cpu: 1
        memory: 1Gi
        disk: 10Gi
        reservedCPUPercentage: 25
      persistent: true
  workspace.crownlabs.polito.it/WorkspaceRef:
    name: standalone