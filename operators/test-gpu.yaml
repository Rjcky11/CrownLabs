apiVersion: crownlabs.polito.it/v1alpha2
kind: Template
metadata:
  name: lab-gpu-polito
  namespace: workspace-standalone
spec:
  workspace.crownlabs.polito.it/WorkspaceRef:
    name: standalone
  prettyName: "Laboratorio AI con GPU"
  description: "Template per verifica allocazione GPU hardware estesa"
  environmentList:
    - name: ai-env
      environmentType: Container
      image: harbor.crownlabs.polito.it/crownlabs-standalone/pytorch:latest
      persistent: false
      resources:
        cpu: "2"
        memory: "4Gi"
        disk: "10Gi"
        reservedCPUPercentage: 25  
        # Test della mappa custom delle risorse estese
        otherResources:
          nvidia.com/gpu: "1"
---
apiVersion: crownlabs.polito.it/v1alpha2
kind: Instance
metadata:
  name: istanza-studente-gpu
  namespace: tenant-john-doe
spec:
  running: true
  template.crownlabs.polito.it/TemplateRef:
    name: lab-gpu-polito
    namespace: workspace-standalone
  tenant.crownlabs.polito.it/TenantRef:
    name: john.doe
